<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenF1 Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --surface: #ffffff;
      --page: #f4f6f8;
      --text: #17202a;
      --muted: #617082;
      --line: #d9e0e7;
      --accent: #e10600;
      --accent-dark: #b90400;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 4px;
      font-size: clamp(2rem, 5vw, 3.5rem);
    }

    h2 {
      margin-bottom: 16px;
    }

    h3 {
      margin-bottom: 8px;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 12px 18px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .status {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 24px;
      padding: 20px;
    }

    .race-card {
      align-items: start;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr auto;
      padding: 16px 0;
    }

    .race-card:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .race-card:last-child {
      padding-bottom: 0;
    }

    .race-card p,
    .race-card span {
      color: var(--muted);
      display: block;
      margin-bottom: 0;
    }

    .standings-grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
    }

    th {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .empty {
      color: var(--muted);
      margin-bottom: 0;
    }

    @media (max-width: 760px) {
      header,
      .race-card {
        grid-template-columns: 1fr;
      }

      header {
        align-items: start;
        flex-direction: column;
      }

      .standings-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>OpenF1 Dashboard</h1>
        <p class="status" id="status">Ready to load live Formula 1 data.</p>
      </div>
      <button id="refresh-data" type="button">Refresh</button>
    </header>

    <section class="panel" aria-labelledby="schedule-title">
      <h2 id="schedule-title">Race Schedule</h2>
      <div id="schedule"></div>
    </section>

    <section class="panel" aria-labelledby="standings-title">
      <h2 id="standings-title">Standings</h2>
      <div id="standings"></div>
    </section>

    <section class="panel" aria-labelledby="points-title">
      <h2 id="points-title">Points Table</h2>
      <div id="points"></div>
    </section>
  </main>

  <script type="module" src="../../js/f1.js"></script>
</body>
</html>
